---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
  namespace: featbit
  labels:
    app: mongodb
    region: east
spec:
  ports:
  - port: 27017
    targetPort: 27017
    name: mongodb
  clusterIP: None
  selector:
    app: mongodb
    region: east
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-2-lb
  namespace: featbit
  labels:
    app: mongodb
    region: east
    pod: mongodb-2
spec:
  type: LoadBalancer
  ports:
  - port: 27017
    targetPort: 27017
    name: mongodb
  selector:
    app: mongodb
    region: east
    statefulset.kubernetes.io/pod-name: mongodb-east-0
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-east
  namespace: featbit
spec:
  serviceName: mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
      region: east
  template:
    metadata:
      labels:
        app: mongodb
        region: east
    spec:
      containers:
      - name: mongodb
        image: mongo:5.0.32
        command:
        - mongod
        - "--replSet"
        - "rs-featbit"
        - "--bind_ip_all"
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: admin
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: password
        - name: MONGO_INITDB_DATABASE
          value: featbit
        ports:
        - containerPort: 27017
          name: mongodb
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
