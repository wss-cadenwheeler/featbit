apiVersion: v1
kind: Pod
metadata:
  labels:
    app: redis
  name: redis
spec:
  imagePullSecrets:
    - name: registry-credentials
  containers:
    - env:
        - name: ALLOW_EMPTY_PASSWORD
          value: "yes"
      image: bitnamilegacy/redis:7.2
      name: redis
      ports:
        - containerPort: 6379
      resources: {}
      volumeMounts:
        - mountPath: /data
          name: redis
  restartPolicy: OnFailure
  volumes:
    - name: redis
      persistentVolumeClaim:
        claimName: redis
status: {}
