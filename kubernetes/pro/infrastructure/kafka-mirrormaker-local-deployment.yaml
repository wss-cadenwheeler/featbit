# MirrorMaker — Local Replication (kafka → kafka-aggregate, same cluster)
#
# Replicates flag and segment change messages from the local main broker
# (kafka:9092) to the local aggregate broker (kafka-aggregate:9092).
# This ensures the local eval-server (which consumes from kafka-aggregate)
# receives changes that originated on this cluster.
#
# The remote MirrorMaker instance (kafka-mirrormaker-remote) handles
# replicating this cluster's changes into the OTHER cluster's aggregate.
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kafka-mirrormaker-local
  name: kafka-mirrormaker-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-mirrormaker-local
  template:
    metadata:
      labels:
        app: kafka-mirrormaker-local
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: mirrormaker
          image: dockerhub.io/bitnamilegacy/kafka:3.5
          command:
            - /bin/bash
            - -c
            - |
              mkdir -p /tmp/mm

              cat > /tmp/mm/consumer.properties << 'EOF'
              bootstrap.servers=kafka:9092
              group.id=featbit-mirrormaker-local
              auto.offset.reset=earliest
              auto.commit.enable=true
              EOF

              cat > /tmp/mm/producer.properties << 'EOF'
              bootstrap.servers=kafka-aggregate:9092
              EOF

              echo "Starting local MirrorMaker: kafka:9092 -> kafka-aggregate:9092"
              exec /opt/bitnami/kafka/bin/kafka-mirror-maker.sh \
                --consumer.config /tmp/mm/consumer.properties \
                --producer.config /tmp/mm/producer.properties \
                --whitelist 'featbit-feature-flag-change|featbit-segment-change|featbit-control-plane-push-full-sync-change' \
                --num.streams 1
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
              ephemeral-storage: 512Mi
            limits:
              memory: 512Mi
              cpu: 250m
              ephemeral-storage: 1Gi
      restartPolicy: Always
status: {}
