apiVersion: v1
kind: Service
metadata:
  labels:
    app: kafka-aggregate
  name: kafka-aggregate
spec:
  # NodePort so the cross-cluster MirrorMaker from the other Minikube cluster
  # can reach this broker via the node's shared bridge network IP (172.31.0.x)
  # at port 30094.  The internal 9092 port is available as ClusterIP to all
  # pods within the same cluster (eval-server, da-server).
  type: NodePort
  selector:
    app: kafka-aggregate
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
    - name: external
      port: 30094
      targetPort: 30094
      nodePort: 30094
status:
  loadBalancer: {}
