apiVersion: v1
kind: Pod
metadata:
  labels:
    app: clickhouse-server
  name: clickhouse-server
spec:
  imagePullSecrets:
    - name: registry-credentials
  containers:
    - image: clickhouse/clickhouse-server:24.8
      name: clickhouse-server
      ports:
        - containerPort: 8123
        - containerPort: 8443
        - containerPort: 9000
        - containerPort: 9009
        - containerPort: 9440
        - containerPort: 9181
      resources:
        requests:
          memory: 768Mi
          cpu: 150m
        limits:
          memory: 1536Mi
          cpu: 1500m
      volumeMounts:
        - mountPath: /etc/clickhouse-server/config.xml
          name: clickhouse-etc
          subPath: "config.xml"
          readOnly: true
        - mountPath: /etc/clickhouse-server/users.xml
          name: clickhouse-etc
          subPath: "users.xml"
          readOnly: true
        - mountPath: /var/lib/clickhouse
          name: clickhouse-server
        - mountPath: /var/log
          name: varlog
    - image: busybox:1.36
      name: clickhouse-server-err-log
      args: [/bin/sh, -c, 'tail -n+1 -F /var/log/clickhouse-server/clickhouse-server.err.log']
      resources:
        requests:
          memory: 16Mi
          cpu: 10m
        limits:
          memory: 64Mi
          cpu: 100m
      volumeMounts:
        - name: varlog
          mountPath: /var/log
      
  restartPolicy: OnFailure
  volumes:
    - name: clickhouse-server
      persistentVolumeClaim:
        claimName: clickhouse-server
    - name: clickhouse-etc
      configMap:
        name: clickhouse-etc
        items:
          - key: "config.xml"
            path: "config.xml"
          - key: "users.xml"
            path: "users.xml"
    - name: varlog
      emptyDir:      
status: {}
