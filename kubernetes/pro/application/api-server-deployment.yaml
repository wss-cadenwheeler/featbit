apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api-server
  name: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  strategy: {}
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - env:
            - name: IS_PRO
              value: "true"
            - name: MqProvider
              value: Kafka
            - name: Kafka__Producer__bootstrap.servers
              value: kafka:9092
            - name: Kafka__Consumer__bootstrap.servers
              value: kafka-aggregate:9092
            - name: UseControlPlane
              value: "true"
            - name: MongoDb__ConnectionString
              value: mongodb://admin:password@mongodb:27017
            - name: MongoDb__Database
              value: featbit
            - name: OLAP__ServiceHost
              value: http://da-server:8200
            - name: Redis__ConnectionString
              value: redis:6379
          image: featbit/featbit-api-server:latest
          # NOTE: The Kafka and UseControlPlane settings below are overridden at deploy time by
          # Deploy-FeatBitClusters.ps1 based on the deployment mode:
          #   Advanced — Consumer points to kafka-aggregate:9092 (aggregate broker); UseControlPlane=true
          #   Basic    — Consumer points to kafka:9092 (no aggregate); UseControlPlane=true
          name: api-server
          ports:
            - containerPort: 5000
          resources: 
            requests:
              memory: 1Gi
              cpu: 500m
              ephemeral-storage: 2Gi 
            limits:
              memory: 2Gi
              cpu: 500m
              ephemeral-storage: 4Gi 
      restartPolicy: Always
status: {}
