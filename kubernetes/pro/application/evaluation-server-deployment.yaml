apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: evaluation-server
  name: evaluation-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evaluation-server
  strategy: {}
  template:
    metadata:
      labels:
        app: evaluation-server
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - env:
            - name: IS_PRO
              value: "true"
            - name: MqProvider
              value: Kafka
            - name: Kafka__Producer__bootstrap.servers
              value: kafka:9092
            - name: Kafka__Consumer__bootstrap.servers
              value: kafka-aggregate:9092
            - name: ControlPlane__Enabled
              value: "true"
            - name: MongoDb__ConnectionString
              value: mongodb://admin:password@mongodb:27017
            - name: MongoDb__Database
              value: featbit
            - name: Redis__ConnectionString
              value: redis:6379
          image: featbit/featbit-evaluation-server:latest
          # NOTE: The Kafka and ControlPlane__Enabled settings below are overridden at
          # deploy time by Deploy-FeatBitClusters.ps1 based on the deployment mode:
          #   Advanced — Consumer points to kafka-aggregate:9092; ControlPlane__Enabled=true
          #   Basic    — Consumer points to kafka:9092; ControlPlane__Enabled=true
          name: evaluation-server
          ports:
            - containerPort: 5100
          readinessProbe:
            tcpSocket:
              port: 5100
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          resources: 
            requests:
              memory: 192Mi
              cpu: 50m
              ephemeral-storage: 2Gi
            limits:
              memory: 384Mi
              cpu: 1500m
              ephemeral-storage: 4Gi
      restartPolicy: Always
status: {}
