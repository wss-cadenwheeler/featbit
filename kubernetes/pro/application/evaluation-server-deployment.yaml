apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: evaluation-server
  name: evaluation-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-server
  strategy: {}
  template:
    metadata:
      labels:
        app: evaluation-server
    spec:
      containers:
        - env:
            - name: IS_PRO
              value: "true"
            - name: MqProvider
              value: Kafka
            - name: Kafka__Producer__bootstrap.servers
              value: kafka:9092
            - name: Kafka__Consumer__bootstrap.servers
              value: kafka-aggregate:9092
            - name: ControlPlane__UseControlPlane
              value: "true"
            - name: MongoDb__ConnectionString
              value: mongodb://admin:password@mongodb:27017
            - name: MongoDb__Database
              value: featbit
            - name: Redis__ConnectionString
              value: redis:6379
          image: featbit/featbit-evaluation-server:latest
          # NOTE: The Kafka and ControlPlane__UseControlPlane settings below are overridden at
          # deploy time by Deploy-FeatBitClusters.ps1 based on the deployment mode:
          #   Advanced — Consumer points to kafka-aggregate:9092; ControlPlane__UseControlPlane=true
          #   Basic    — Consumer points to kafka:9092; ControlPlane__UseControlPlane=true
          name: evaluation-server
          ports:
            - containerPort: 5100
          resources: 
            requests:
              memory: 512Mi
              cpu: 500m
              ephemeral-storage: 2Gi 
            limits:
              memory: 2Gi
              cpu: 500m
              ephemeral-storage: 4Gi 
      restartPolicy: Always
status: {}
