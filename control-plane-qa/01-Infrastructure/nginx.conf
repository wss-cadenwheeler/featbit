worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Access log format that includes which upstream backend handled each request.
    # $upstream_addr shows the backend IP:port (e.g. 127.0.0.1:8081 = west UI,
    # 127.0.0.1:8082 = east UI, 127.0.0.1:15000 = west API, etc.)
    log_format upstream '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        'upstream=$upstream_addr rt=$request_time';
    access_log logs/access.log upstream;
    
    # Increase hash bucket size for long server names
    server_names_hash_bucket_size 255;
    map_hash_bucket_size 64;

    # ── Dynamic CORS origin — echoes back any known FeatBit origin ───────────
    # Allows the load-balanced featbit.local origin to reach per-cluster API/eval
    # endpoints (featbit-api.west.local, featbit-api.east.local, etc.) without
    # hardcoding a single allowed origin in each server block.
    map $http_origin $cors_origin {
        default                      "";
        "http://featbit.local"        "http://featbit.local";
        "http://featbit.west.local"   "http://featbit.west.local";
        "http://featbit.east.local"   "http://featbit.east.local";
    }

    # ── Active/Active upstreams (round-robin across west + east) ──────────────
    upstream featbit_ui {
        server 127.0.0.1:8081;
        server 127.0.0.1:8082;
    }

    upstream featbit_api {
        server 127.0.0.1:15000;
        server 127.0.0.1:15001;
    }

    upstream featbit_eval {
        server 127.0.0.1:5100;
        server 127.0.0.1:5101;
    }

    # ── Active/Active load-balanced servers ───────────────────────────────────

    # Load-balanced UI
    server {
        listen 80;
        server_name featbit.local;

        # Handle the bare-root redirect here so it never reaches the upstream.
        # The UI container redirects / → /en internally (via rewrite ^/$), but
        # proxy_intercept_errors on intercepts that 301 and its behaviour with an
        # upstream group is unreliable.  Doing the redirect ourselves is simpler
        # and avoids any round-robin ambiguity.
        location = / {
            return 302 /en;
        }

        location / {
            proxy_pass http://featbit_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            error_page 404 = @lb_spa_fallback;
        }

        location @lb_spa_fallback {
            rewrite ^ /index.html break;
            proxy_pass http://featbit_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Load-balanced API
    server {
        listen 80;
        server_name featbit-api.local;

        location / {
            proxy_pass http://featbit_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Hide backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            # CORS headers - allow any known FeatBit origin
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,organization,workspace,accept,accept-language" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "3600" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }

    # Load-balanced Evaluation (WebSocket-aware)
    server {
        listen 80;
        server_name featbit-eval.local;

        location / {
            proxy_pass http://featbit_eval;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade (required for the evaluation-server /streaming endpoint)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_read_timeout 86400;

            # Hide backend CORS headers to avoid duplicates
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Max-Age;

            # CORS headers - allow any known FeatBit origin
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,organization,workspace,accept,accept-language" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "3600" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }
    }

    # ── Per-cluster servers ───────────────────────────────────────────────────

    # West UI
    server {
        listen 80;
        server_name featbit.west.local;

        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Angular SPA fallback: intercept upstream 404s and serve index.html
            # so direct deep-link navigation (e.g. /login, /feature-flags) works.
            proxy_intercept_errors on;
            error_page 404 = @west_spa_fallback;
        }

        location @west_spa_fallback {
            rewrite ^ /index.html break;
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # West API
    server {
        listen 80;
        server_name featbit-api.west.local;

        location / {
