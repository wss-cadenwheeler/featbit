# Intra-cluster eval <-> kafka partition for the GatedCommit readiness fence (CP-13).
#
# Unlike the cross-DC partition, this is a LOCAL failure: the evaluation-server pod stays
# up and serving (its /health/* endpoint remains reachable) but is cut off from its local
# kafka, so it can no longer publish heartbeats to the control plane. Under GatedCommit,
# once heartbeat staleness exceeds ControlPlane:HeartbeatStalenessThresholdSeconds the
# HeartbeatFreshnessHealthCheck fails /health/readiness (503) — a hard readiness fence —
# while /health/liveness stays 200 (the pod is pulled from rotation, not restarted).
#
# Apply in the cluster whose eval-server is under test (east for CP-13).
#   start: kubectl --context east apply  -f eval-kafka-partition.yaml
#   stop:  kubectl --context east delete -f eval-kafka-partition.yaml --ignore-not-found
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: eval-kafka-partition
  namespace: chaos-mesh
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - featbit
    labelSelectors:
      app: evaluation-server
  direction: both
  # Kafka is NOT an in-cluster pod in this topology — it lives on the host
  # (kafka ExternalName -> host.minikube.internal). Block the eval pods' egress to
  # east's host gateway instead; that severs their kafka producer (heartbeats) while
  # in-cluster serving (Redis, /health endpoints) stays up.
  externalTargets:
    - "192.168.58.1"
  duration: "10m"
