# Minimal-footprint OpenTelemetry demo overrides for the east/west test clusters.
# Goal: run alongside FeatBit on a single minikube node (laptop capacity test).
#
# Approx reserved memory of the optional pieces (limit == request for these):
#   load-generator ...... 1500Mi   store traffic driver
#   opensearch .......... 1100Mi   telemetry log/trace store (NOT application data)
#   jaeger ..............  600Mi   trace UI / query
#   prometheus ..........  400Mi   metrics store
#   grafana .............  300Mi   dashboards (pure UI; cheapest to drop)
# Flip the observability backends you don't need to `enabled: false` to reclaim it.
# NOTE: disabling a backend while the collector still exports to it only produces
# harmless "connection refused" export logs in the collector — not a failure.

default:
  replicas: 1

components:
  # This chart has no global default.resources and sets only *memory* limits per
  # component — CPU is unbounded, which let the checkout pod spin to ~6 cores and
  # starve the node's network/DNS. So we cap CPU per component here.
  #
  # Each gets a small cpu *request* AND a cpu *limit*. The request is what keeps
  # them schedulable: a bare cpu limit makes Kubernetes default the request to
  # the limit, so ~22 components x 1 core would demand 22 cores on a 10-core node
  # and go unschedulable. The 1-core limit bounds any single runaway so it can't
  # take the node down with it. load-generator and kafka get 2 cores (the load
  # driver and the JVM broker legitimately burst). Memory limits are inherited
  # from the chart except where noted (ad/fraud-detection bumped to 512Mi: their
  # JVM + OTel Java agent OOMKilled (exit 137) at the chart's 300Mi default).
  accounting:      { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  ad:              { resources: { requests: { cpu: 25m }, limits: { cpu: "1", memory: 512Mi } } }
  cart:            { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  checkout:        { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  currency:        { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  email:           { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  flagd:           { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  fraud-detection: { resources: { requests: { cpu: 25m }, limits: { cpu: "1", memory: 512Mi } } }
  frontend:        { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  frontend-proxy:  { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  image-provider:  { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  llm:             { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  payment:         { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  product-catalog: { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  product-reviews: { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  quote:           { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  recommendation:  { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  shipping:        { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  postgresql:      { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  valkey-cart:     { resources: { requests: { cpu: 25m }, limits: { cpu: "1" } } }
  kafka:           { resources: { requests: { cpu: 50m }, limits: { cpu: "2" } } }
  load-generator:
    enabled: true
    # Disable the Playwright/Chromium browser-traffic user. The HTTP user already
    # covers the full backend API surface; browser traffic only adds client-side
    # RUM telemetry (discarded by the nop collector) and fails 100% here.
    envOverrides:
      - name: LOCUST_BROWSER_TRAFFIC_ENABLED
        value: "false"
    resources:
      requests:
        cpu: 50m
      limits:
        cpu: "2"

# --- Observability backend toggles -------------------------------------------

# OpenSearch — telemetry log/trace storage, NOT application data (the demo app
# uses Kafka + PostgreSQL + Valkey, see "resource sharing" notes). Kept on until
# we confirm nothing depends on it; ~1.1Gi — the first thing to reconsider.
opensearch:
  enabled: true

# Jaeger — distributed-tracing UI/query (~600Mi). Disable if the trace UI isn't needed.
jaeger:
  enabled: true

# Prometheus — metrics storage/queries (~400Mi).
prometheus:
  enabled: true

# Grafana — dashboards UI (~300Mi).
grafana:
  enabled: true

# --- Collector: receive-and-drop, minimum footprint -------------------------
#
# We don't need the telemetry for the capacity test, so the collector accepts
# OTLP from the demo services (so their SDKs don't error) and discards
# everything via the `nop` exporter. All metric-scraping presets and the heavy
# transform / spanmetrics / kafkametrics work are removed, so it runs in ~128Mi
# instead of OOMKilling at the chart's 200Mi default.
opentelemetry-collector:
  resources:
    requests:
      cpu: 25m
    limits:
      cpu: 500m
      memory: 128Mi          # minimum that runs reliably (~96Mi likely also OK)
  # Turn off all scraping presets — pure telemetry generation we don't want.
  presets:
    hostMetrics:
      enabled: false
    kubernetesAttributes:
      enabled: false
    kubeletMetrics:
      enabled: false
    clusterMetrics:
      enabled: false
    annotationDiscovery:
      metrics:
        enabled: false
  config:
    exporters:
      nop: {}              # discards everything routed to it
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [nop]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [nop]
        logs:
          receivers: [otlp]
          processors: [memory_limiter]
          exporters: [nop]
      # Stop the collector exporting its own internal metrics (extra load).
      telemetry:
        metrics:
          level: none
          readers: []
