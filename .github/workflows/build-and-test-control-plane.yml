name: Build and Test Control Plane
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'modules/control-plane/**'
      - '.github/build-and-test-control-plane.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'modules/control-plane/**'
      - '.github/build-and-test-control-plane.yml'

jobs:
  validate:
    name: build-and-test-control-plane
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/control-plane
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Packages
        run: dotnet restore

      - name: Build Solution
        run: dotnet build -c Release --no-restore

      - name: Run Tests
        run: dotnet test -c Release --no-build --verbosity normal
